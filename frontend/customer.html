<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- FIX: added Bootstrap CSS so modal and button styles work -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <section id="tables"></section>

    <!-- FIX: copied add modal from manager.html so insertTuple/buildAddModal work here too -->
    <div id="modal-add" class="modal stock-modal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Add Row to Table</h5>
            <button
              type="button"
              id="btn-close"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div id="new-tuple">
          </div>
          <div class="modal-footer">
            <button
              id="close-add-modal"
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              <i class="bi bi-x"></i> Close
            </button>
            <button id="add-btn" type="button" class="btn btn-primary">
              <i class="bi bi-plus-circle"></i> Add
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Script Links-->
    <script src="js/table_output.js"></script>

    <!-- Call Necessary Functions -->
    <script>
      printRelationsForRole("customer_role");
    </script>
    <!-- FIX: added Bootstrap bundle so modal open/close works -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
