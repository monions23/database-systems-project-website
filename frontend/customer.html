<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hamburg Inn — Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
      body { background: #f4f6f8; }
      .navbar-brand { font-weight: 600; letter-spacing: 0.01em; }
      .section-card {
        background: #fff;
        border: 1px solid #dee2e6;
        border-radius: 6px;
        margin-bottom: 28px;
      }
      .section-card .card-header {
        background: #f8f9fa;
        border-bottom: 1px solid #dee2e6;
        padding: 12px 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-card .card-header h5 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
      }
      .section-card .card-header .text-muted { font-size: 12px; }
      .section-card .card-body { padding: 18px; }
      #status-bar { font-size: 12px; }
 
      /* Menu layout */
      .menu-columns { display: flex; gap: 32px; }
      .menu-column { flex: 1; }
      .menu-category-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #6c757d;
        font-weight: 600;
        padding: 12px 0 6px;
        border-bottom: 2px solid #dee2e6;
        margin-bottom: 4px;
      }
      .menu-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid #f0f0f0;
        font-size: 13px;
      }
      .menu-item:last-child { border-bottom: none; }
      .item-price {
        font-weight: 600;
        color: #198754;
        white-space: nowrap;
        margin-left: 12px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark px-3 py-2 mb-0">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-egg-fried me-2"></i>Hamburg Inn
      </span>
      <div class="d-flex align-items-center gap-2" id="status-bar">
        <span class="badge bg-info text-dark">Menu</span>
        <span class="text-white-50" id="status-text"></span>
      </div>
    </nav>
 
    <div class="container-fluid py-4 px-4">
 
      <!-- MENU -->
      <div class="section-card">
        <div class="card-header">
          <i class="bi bi-journal-text text-secondary"></i>
          <h5>Our Menu</h5>
          <span class="text-muted ms-auto">Hamburg Inn No. 2 — Iowa City, IA</span>
        </div>
        <div class="card-body">
          <div id="menu-area">
            <div class="text-center text-muted py-3">Loading menu...</div>
          </div>
        </div>
      </div>
 
      <!-- EVENTS -->
      <div class="section-card">
        <div class="card-header">
          <i class="bi bi-calendar-event text-secondary"></i>
          <h5>Upcoming Events</h5>
          <span class="text-muted ms-auto">Join us for trivia, bingo, and more</span>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover table-bordered mb-0">
              <thead>
                <tr>
                  <th>Event</th>
                  <th>Day</th>
                  <th>Start</th>
                  <th>End</th>
                </tr>
              </thead>
              <tbody id="events-body">
                <tr><td colspan="4" class="text-center text-muted py-3">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
 
    </div>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const API_BASE = "http://127.0.0.1:8000/crud";
 
      function fmt(val, type) {
        if (val === null || val === undefined) return "—";
        if (type === "money") return "$" + parseFloat(val).toFixed(2);
        if (type === "dt") return new Date(val).toLocaleString("en-US", {
          month: "short", day: "numeric", year: "numeric",
          hour: "numeric", minute: "2-digit"
        });
        return val;
      }
 
      async function loadCustomer() {
        try {
          const res = await fetch(API_BASE + "/customer_role");
          if (!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();
          renderMenu(data);
          renderEvents(data["Events"]);
        } catch (e) {
          document.getElementById("menu-area").innerHTML =
            `<div class="text-danger"><i class="bi bi-wifi-off me-1"></i>Could not reach backend: ${e.message}</div>`;
        }
      }
 
      function renderMenu(data) {
        const menuItems = data["Menu_Item"]?.data || [];
        const subtypes = ["Entree", "Appetizer", "Side", "Drink", "Milkshake"];
        const typeMap = {};
        subtypes.forEach(sub => {
          if (data[sub]) data[sub].data.forEach(r => { typeMap[r[0]] = sub; });
        });
 
        const grouped = {
          Breakfast: [],
          Entree: [],
          Appetizer: [],
          Side: [],
          Drink: [],
          Milkshake: []
        };
 
        menuItems.forEach(row => {
          const [id, name, price, , isBreakfast] = row;
          const type = typeMap[id] || "Entree";
          const item = { name, price };
          if (isBreakfast && type !== "Drink") grouped.Breakfast.push(item);
          else if (grouped[type]) grouped[type].push(item);
        });
 
        const sections = Object.entries(grouped).filter(([, items]) => items.length);
        const half = Math.ceil(sections.length / 2);
        const left = sections.slice(0, half);
        const right = sections.slice(half);
 
        function buildColumn(secs) {
          return secs.map(([cat, items]) => `
            <div class="menu-category-title">${cat === "Entree" ? "Entrees" : cat === "Milkshake" ? "Milkshakes" : cat}</div>
            ${items.map(i => `
              <div class="menu-item">
                <span>${i.name}</span>
                <span class="item-price">${fmt(i.price, "money")}</span>
              </div>`).join("")}
          `).join("");
        }
 
        document.getElementById("menu-area").innerHTML = `
          <div class="menu-columns">
            <div class="menu-column">${buildColumn(left)}</div>
            <div class="menu-column">${buildColumn(right)}</div>
          </div>`;
      }
 
      function renderEvents(evts) {
        const tbody = document.getElementById("events-body");
        if (!evts || !evts.data.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">No upcoming events</td></tr>';
          return;
        }
        tbody.innerHTML = evts.data.map(row => {
          const [, name, start, end, day] = row;
          const badge = name === "Trivia Night"
            ? '<span class="badge bg-info text-dark">Trivia</span>'
            : '<span class="badge bg-warning text-dark">Bingo</span>';
          return `<tr>
            <td>${badge} ${name}</td>
            <td>${day || "—"}</td>
            <td class="text-muted">${fmt(start, "dt")}</td>
            <td class="text-muted">${fmt(end, "dt")}</td>
          </tr>`;
        }).join("");
      }
 
      loadCustomer();
    </script>
  </body>
</html>
